name: PHPUnit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, mysqli, dom, json, libxml, tokenizer, xml, xmlwriter, fileinfo, zip
          coverage: none
          tools: composer:v2

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent && break
            sleep 1
          done

      - name: Install composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Configure wp-tests-config.php
        run: |
          cp tests/wp-tests-config-sample.php tests/wp-tests-config.php
          sed -i "s|define( 'ABSPATH'.*|define( 'ABSPATH', dirname( __DIR__ ) . '/vendor/wp-phpunit/wp-phpunit/wordpress/' );|" tests/wp-tests-config.php
          sed -i "s|define( 'DB_HOST'.*|define( 'DB_HOST', '127.0.0.1:3306' );|" tests/wp-tests-config.php
          sed -i "s|define( 'DB_NAME'.*|define( 'DB_NAME', 'wordpress_test' );|" tests/wp-tests-config.php

      - name: Run phpunit
        run: vendor/bin/phpunit
