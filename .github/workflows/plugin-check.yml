name: Plugin Check

# Runs the official WordPress Plugin Check (https://wordpress.org/plugins/plugin-check/)
# — the same tool the WP.org plugin-review team runs against submissions.
#
# We drive wp-env directly because the wordpress/plugin-check-action wrapper
# installs the plugin via wp-env "mappings", which silently fails when the
# plugin source lives in a repo subdirectory.
#
# We also bypass wp-env's plugin install entirely and `docker cp` our plugin
# straight into the running WordPress container. Both the "plugins" array
# entry for a local directory AND the (non-existent) `wp-env install-path`
# command have proven unreliable; docker cp removes all the abstractions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install wp-env
        run: npm install -g @wordpress/env

      - name: Configure wp-env
        run: |
          cat > .wp-env.json <<'EOF'
          {
            "core": null,
            "phpVersion": "8.4",
            "plugins": [
              "https://downloads.wordpress.org/plugin/plugin-check.zip"
            ]
          }
          EOF
          cat .wp-env.json

      - name: Start wp-env
        run: wp-env start

      - name: Stage plugin
        # Stage the same files that build.py / `wp dist-archive` would ship to
        # WP.org — driven by .distignore so there's a single source of truth.
        # Plugin Check flags any dev/build files in the staged copy
        # (phpcs.xml.dist, .gitignore, etc.), so this must mirror the release
        # zip exactly.
        run: |
          mkdir -p /tmp/staging/i-downloads
          rsync -a \
            --exclude='.wp-env.json' \
            --exclude-from="${{ github.workspace }}/.distignore" \
            "${{ github.workspace }}/" /tmp/staging/i-downloads/
          ls -la /tmp/staging/i-downloads/

      - name: Inject plugin via docker cp
        run: |
          set -x

          # wp-env starts BOTH a dev and a tests environment, each with its
          # own wordpress container. We need the dev one because `wp-env run
          # cli` defaults there. Filter by name and exclude '-tests-'.
          CONTAINER=$(docker ps --format "{{.Names}}" \
            | grep -E '^wp-env-.*-wordpress-1$' \
            | grep -v -- '-tests-' \
            | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "Could not find wp-env dev wordpress container. docker ps output:"
            docker ps
            exit 1
          fi
          echo "Using container: $CONTAINER"

          docker cp /tmp/staging/i-downloads "$CONTAINER:/var/www/html/wp-content/plugins/"

      - name: Verify and activate plugin
        run: |
          wp-env run cli wp plugin list
          wp-env run cli wp plugin activate i-downloads

      - name: Run Plugin Check
        # Severity 7 = errors only (Plugin Check uses 1-10 scale; 7+ is ERROR).
        # `|| true` keeps the output visible while we calibrate. Remove it once
        # we're consistently green and want CI to block on findings.
        run: |
          wp-env run cli wp plugin check i-downloads \
            --format=table \
            --exclude-directories=vendor,node_modules,tests \
            --severity=7 \
            || true

      - name: Stop wp-env
        if: always()
        run: wp-env stop || true
