name: Plugin Check

# Runs the official WordPress Plugin Check (https://wordpress.org/plugins/plugin-check/)
# — the same tool the WP.org plugin-review team runs against submissions.
#
# We drive wp-env directly instead of using the wordpress/plugin-check-action
# wrapper because that action installs the plugin via wp-env "mappings", which
# silently fails to register the plugin when the source lives in a subdirectory
# of the repo. The wp-env "plugins" array (used here) copies the directory into
# wp-content/plugins/ and is the supported path for local plugin sources.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install wp-env
        run: npm install -g @wordpress/env

      - name: Configure wp-env
        run: |
          cat > .wp-env.json <<'EOF'
          {
            "core": null,
            "plugins": [
              "./i-downloads",
              "https://downloads.wordpress.org/plugin/plugin-check.zip"
            ]
          }
          EOF
          cat .wp-env.json

      - name: Start wp-env
        run: wp-env start

      - name: Verify plugin installed
        run: |
          wp-env run cli wp plugin list
          wp-env run cli wp plugin activate i-downloads

      - name: Run Plugin Check
        # Severity gate: ERROR only for now. The `|| true` lets the output
        # surface even when checks fail, so we see what's flagged on the first
        # run. Remove `|| true` once we're consistently green and want CI to
        # block on findings.
        run: |
          wp-env run cli wp plugin check i-downloads \
            --format=table \
            --exclude-directories=vendor,node_modules,tests \
            --severity=7 \
            || true

      - name: Stop wp-env
        if: always()
        run: wp-env stop
